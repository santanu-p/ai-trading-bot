version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tradingbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    command: /bin/sh -c "alembic upgrade head && uvicorn tradingbot.api.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tradingbot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    command: /bin/sh -c "alembic upgrade head && celery -A tradingbot.worker.celery_app:celery_app worker -B --loglevel=INFO"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tradingbot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
